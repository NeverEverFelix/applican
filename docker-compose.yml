services:
  applican:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: applican-web
    ports:
      - "8080:80"
    depends_on:
      - redis
      - applicanrag
      - resume-extract
    restart: unless-stopped
    networks:
      - applican-net

  applicanrag:
    build:
      context: ../ApplicanRAG
      dockerfile: Dockerfile
    container_name: applican-rag
    environment:
      PORT: "8000"
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - applican-net

  resume-extract:
    build:
      context: ../ResumeExtract/resume-extract
      dockerfile: Dockerfile
    container_name: resume-extract
    env_file:
      - ../ResumeExtract/resume-extract/.env
    environment:
      WORKER_ATTACH_TO_API: "true"
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - applican-net

  redis:
    image: redis:7-alpine
    container_name: applican-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - applican-net

networks:
  applican-net:
    driver: bridge
