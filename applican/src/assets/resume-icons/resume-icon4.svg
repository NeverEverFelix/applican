<svg width="420" height="520" viewBox="0 0 420 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="titleBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>

    <linearGradient id="cornerPeach" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF9E2C"/>
      <stop offset="100%" stop-color="#F2C7F0"/>
    </linearGradient>

    <linearGradient id="softBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#BFDBFE"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>

    <linearGradient id="greenBadge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8CF6A0"/>
      <stop offset="100%" stop-color="#2FE363"/>
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-opacity="0.18"/>
    </filter>

    <style>
      .paper { fill:#F8F6EC; stroke:#E9E3D0; stroke-width:2; }
      .lineA { fill:#AEB9CF; }
      .lineB { fill:#97A7C3; }
      .ink { stroke:#0B0D0C; }
    </style>
  </defs>

  <g filter="url(#shadow)">
    <rect x="40" y="30" width="340" height="450" rx="26" class="paper"/>
  </g>

  <!-- folded corner -->
  <path d="M300 30 L340 70 L300 70 Z" fill="url(#cornerPeach)"/>

  <!-- top meta pill -->
  <rect x="80" y="90" width="120" height="18" rx="9" fill="url(#softBlue)"/>

  <!-- title -->
  <rect x="80" y="122" width="230" height="18" rx="9" fill="url(#titleBlue)"/>

  <!-- lines -->
  <rect x="80" y="170" width="270" height="12" rx="6" class="lineA"/>
  <rect x="80" y="200" width="248" height="12" rx="6" class="lineB"/>
  <rect x="80" y="230" width="286" height="12" rx="6" class="lineA"/>

  <!-- highlighted subsection -->
  <rect x="80" y="278" width="170" height="14" rx="7" fill="url(#cornerPeach)"/>

  <rect x="80" y="320" width="270" height="12" rx="6" class="lineA"/>
  <rect x="80" y="350" width="250" height="12" rx="6" class="lineB"/>
  <rect x="80" y="380" width="205" height="12" rx="6" class="lineA"/>

  <!-- GSAP-like neon approval -->
  <g transform="translate(285 288)">
    <circle cx="35" cy="35" r="35" fill="url(#greenBadge)"/>
    <path d="M21 35 L31 45 L50 26" class="ink" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>