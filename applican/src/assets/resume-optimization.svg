<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardBorder" x1="170" y1="105" x2="930" y2="625" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5B6472"/>
      <stop offset="55%" stop-color="#444C59"/>
      <stop offset="100%" stop-color="#7A8391"/>
    </linearGradient>

    <linearGradient id="cardFill" x1="170" y1="105" x2="930" y2="625" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111214"/>
      <stop offset="55%" stop-color="#0D0E10"/>
      <stop offset="100%" stop-color="#090A0C"/>
    </linearGradient>

    <linearGradient id="afterFill" x1="565" y1="255" x2="895" y2="465" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1B1E24"/>
      <stop offset="100%" stop-color="#101216"/>
    </linearGradient>

    <linearGradient id="pillFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7D8694"/>
      <stop offset="100%" stop-color="#5A6270"/>
    </linearGradient>

    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>

  <g filter="url(#cardShadow)">
    <rect x="170" y="105" width="760" height="520" rx="28" fill="url(#cardFill)"/>
    <rect x="171.25" y="106.25" width="757.5" height="517.5" rx="26.75"
          stroke="url(#cardBorder)"
          stroke-width="1.5"/>
  </g>

  <rect x="205" y="138" width="118" height="40" rx="20"
        fill="url(#pillFill)" fill-opacity="0.12"/>
  <rect x="205.75" y="138.75" width="116.5" height="38.5" rx="19.25"
        stroke="url(#pillFill)" stroke-opacity="0.75" stroke-width="1.2"/>

  <text x="264" y="164"
        text-anchor="middle"
        fill="#ECEFF4"
        font-family="Inter, Arial, sans-serif"
        font-size="16"
        font-weight="700"
        letter-spacing="0.08em">
    __ACTION__
  </text>

  <text x="345" y="164"
        fill="#E6EAF0"
        fill-opacity="0.5"
        font-family="Inter, Arial, sans-serif"
        font-size="20"
        font-weight="500">
    __TITLE__
  </text>

  <text x="205" y="245"
        fill="#ADB4BF"
        font-family="Inter, Arial, sans-serif"
        font-size="16"
        font-weight="600"
        letter-spacing="0.12em">
    BEFORE
  </text>

  <text x="585" y="245"
        fill="#C3CAD4"
        font-family="Inter, Arial, sans-serif"
        font-size="16"
        font-weight="600"
        letter-spacing="0.12em">
    AFTER
  </text>

  <rect x="205" y="261" width="330" height="210" rx="20"
        fill="#FFFFFF" fill-opacity="0.02"
        stroke="#FFFFFF" stroke-opacity="0.06"
        stroke-width="1.2"/>

  <rect x="565" y="261" width="330" height="210" rx="20"
        fill="url(#afterFill)"
        stroke="url(#cardBorder)"
        stroke-width="1.35"/>

  <foreignObject x="235" y="289" width="270" height="170">
    <div xmlns="http://www.w3.org/1999/xhtml"
         style="
           width:100%;
           height:100%;
           color:#BCC3CD;
           font-family:Inter, Arial, sans-serif;
           font-size:__BEFORE_FONT_SIZE__px;
           line-height:1.35;
           font-weight:400;
           white-space:normal;
           overflow-wrap:anywhere;
           word-break:break-word;
           overflow:hidden;
         ">
      __BEFORE_TEXT__
    </div>
  </foreignObject>

  <foreignObject x="595" y="289" width="270" height="170">
    <div xmlns="http://www.w3.org/1999/xhtml"
         style="
           width:100%;
           height:100%;
           color:#F1F3F6;
           font-family:Inter, Arial, sans-serif;
           font-size:__AFTER_FONT_SIZE__px;
           line-height:1.35;
           font-weight:500;
           white-space:normal;
           overflow-wrap:anywhere;
           word-break:break-word;
           overflow:hidden;
         ">
      __AFTER_TEXT__
    </div>
  </foreignObject>

  <line x1="205" y1="515" x2="895" y2="515"
        stroke="#FFFFFF"
        stroke-opacity="0.07"
        stroke-width="1"/>

  <text x="205" y="555"
        fill="#E4E8EE"
        font-family="Inter, Arial, sans-serif"
        font-size="14"
        font-weight="700"
        letter-spacing="0.10em">
    WHY THIS WORKS
  </text>

  <text x="205" y="590"
        fill="#9EA7B3"
        font-family="Inter, Arial, sans-serif"
        font-size="18"
        font-weight="400">
    __REASON_TEXT__
  </text>
</svg>
