<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="robotGrad" x1="120" y1="120" x2="394" y2="396" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#63B8F6"/>
      <stop offset="52%" stop-color="#5F7DF5"/>
      <stop offset="100%" stop-color="#A35CF3"/>
    </linearGradient>

    <linearGradient id="plugGrad" x1="84" y1="342" x2="430" y2="382" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2F80F7"/>
      <stop offset="100%" stop-color="#7367F6"/>
    </linearGradient>

    <linearGradient id="alertGrad" x1="326" y1="140" x2="394" y2="208" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFA45B"/>
      <stop offset="100%" stop-color="#FF3F86"/>
    </linearGradient>

    <linearGradient id="sparkGrad" x1="246" y1="334" x2="280" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFB21C"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="512" height="512" fill="white"/>

  <!-- antenna -->
  <rect x="245" y="78" width="10" height="44" rx="5" fill="url(#robotGrad)"/>
  <circle cx="250" cy="69" r="18" fill="url(#robotGrad)"/>

  <!-- robot outer -->
  <rect x="136" y="120" width="240" height="200" rx="58" fill="url(#robotGrad)"/>

  <!-- robot ears -->
  <rect x="114" y="176" width="18" height="62" rx="9" fill="#5DAEF6"/>
  <rect x="380" y="178" width="18" height="60" rx="9" fill="#8E68F4"/>

  <!-- robot face -->
  <rect x="159" y="152" width="180" height="136" rx="36" fill="#172447"/>

  <!-- x eyes -->
  <path d="M202 197L223 218" stroke="white" stroke-width="9" stroke-linecap="round"/>
  <path d="M223 197L202 218" stroke="white" stroke-width="9" stroke-linecap="round"/>

  <path d="M287 197L308 218" stroke="white" stroke-width="9" stroke-linecap="round"/>
  <path d="M308 197L287 218" stroke="white" stroke-width="9" stroke-linecap="round"/>

  <!-- mouth -->
  <rect x="222" y="246" width="68" height="10" rx="5" fill="#B8C5E0"/>

  <!-- alert badge -->
  <circle cx="359" cy="176" r="43" fill="white"/>
  <circle cx="359" cy="176" r="35" fill="url(#alertGrad)"/>
  <rect x="354" y="155" width="10" height="26" rx="5" fill="white"/>
  <circle cx="359" cy="192" r="4.5" fill="white"/>

  <!-- alert rays -->
  <rect x="391" y="141" width="7" height="22" rx="3.5" transform="rotate(16 391 141)" fill="#F59A23"/>
  <rect x="409" y="156" width="7" height="22" rx="3.5" transform="rotate(49 409 156)" fill="#F59A23"/>
  <rect x="418" y="183" width="7" height="22" rx="3.5" transform="rotate(90 418 183)" fill="#F59A23"/>

  <!-- cable left -->
  <path d="M100 382C78 382 62 366 62 344C62 322 78 306 100 306"
        stroke="url(#plugGrad)" stroke-width="10" stroke-linecap="round"/>

  <path d="M100 354H178" stroke="url(#plugGrad)" stroke-width="10" stroke-linecap="round"/>

  <!-- left plug -->
  <rect x="168" y="338" width="48" height="32" rx="14" fill="url(#plugGrad)"/>
  <rect x="209" y="346" width="22" height="7" rx="3.5" fill="url(#plugGrad)"/>
  <rect x="209" y="359" width="22" height="7" rx="3.5" fill="url(#plugGrad)"/>

  <!-- cable right -->
  <path d="M412 382C434 382 450 366 450 344C450 322 434 306 412 306"
        stroke="url(#plugGrad)" stroke-width="10" stroke-linecap="round"/>

  <path d="M334 354H412" stroke="url(#plugGrad)" stroke-width="10" stroke-linecap="round"/>

  <!-- right plug -->
  <rect x="294" y="338" width="48" height="32" rx="14" fill="url(#plugGrad)"/>

  <!-- center warning spark -->
  <path d="M255 320L243 349H257L248 378L271 344H257L267 320H255Z" fill="#F6A300"/>

  <rect x="266" y="372" width="7" height="18" rx="3.5" transform="rotate(-48 266 372)" fill="#9B5CF4"/>
  <rect x="248" y="376" width="6" height="14" rx="3" transform="rotate(8 248 376)" fill="#6F7BF6"/>
  <rect x="281" y="365" width="6" height="14" rx="3" transform="rotate(90 281 365)" fill="#6F7BF6"/>
</svg>